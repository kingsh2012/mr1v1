; AMX Mod X plugins

; Admin Base - Always one has to be activated
admin.amxx		; admin base (required for any admin-related)
;admin_sql.amxx		; admin base - SQL version (comment admin.amxx)

; Basic
;admincmd.amxx		; basic admin console commands -- RCON直接操作引擎命令即可，参考PROCS.PRO比赛模式不加载
;adminhelp.amxx		; help command for admin console commands -- 无对应amx_*命令可帮助，禁用
;adminslots.amxx	; slot reservation -- 1v1不需要预留席位
;multilingual.amxx	; Multi-Lingual management -- 无插件依赖ML翻译，禁用

; Menus
;menufront.amxx		; front-end for admin menus -- 无其他插件注册菜单项，禁用
;cmdmenu.amxx		; command menu (speech, settings) -- 1v1用不到
;plmenu.amxx		; players menu (kick, ban, client cmds.) -- 管理交由RCON，禁用
;telemenu.amxx		; teleport menu (Fun Module required!)
;mapsmenu.amxx		; maps menu (vote, changelevel) -- 已被 .map 内置菜单替代
;pluginmenu.amxx	; Menus for commands/cvars organized by plugin -- 非必需

; Chat / Messages
;adminchat.amxx		; console chat commands -- 比分/换边播报已由 mr1v1_match 自行处理，禁用
;antiflood.amxx		; prevent clients from chat-flooding the server -- 1v1仅2人，风险低，参考PROCS.PRO禁用
;scrollmsg.amxx		; displays a scrolling message -- 与自定义HUD冲突，禁用
;imessage.amxx		; displays information messages -- 非必需
;adminvote.amxx		; vote commands -- 1v1不需要玩家发起投票

; Map related
;nextmap.amxx		; displays next map in mapcycle -- 配合mapchooser使用，已禁用
;mapchooser.amxx	; allows to vote for next map -- 与 .map 流程冲突，禁用
;timeleft.amxx		; displays time left on map -- mp_timelimit 0 下无意义

; Configuration
;pausecfg.amxx		; allows to pause and unpause some plugins -- 调试用，正式环境不需要
;statscfg.amxx		; allows to manage stats plugins via menu and commands -- 比分由 mr1v1_match 自行统计，禁用

; Counter-Strike
;restmenu.amxx		; restrict weapons menu
;statsx.amxx		; stats on death or round end (CSX Module required!) -- 与自定义比分体系重复，参考PROCS.PRO禁用
;miscstats.amxx		; bunch of events announcement for Counter-Strike
;stats_logging.amxx	; weapons stats logging (CSX Module required!)


; Custom - Add 3rd party plugins here
bot_menu.amxx		; 1v1 Bot 控制菜单（say /bot 呼出）
mr1v1_match.amxx	; 1v1 武器轮换比赛核心插件（say .start 或 RCON mr1v1_start 开始）
mr1v1_telemetry.amxx	; 1v1 战斗数据采集（命中/伤害事件，批量HTTP上报，依赖mr1v1_match广播的forward）
