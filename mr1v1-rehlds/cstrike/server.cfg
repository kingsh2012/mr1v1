// ============================================================
// CS 1.6 1v1 对战平台 - 服务端配置 (server.cfg)
// 阶段一测试配置，1v1 专用，按需手动维护（暂不走启动器模板）
// ============================================================

// ---------- 基本信息 ----------
// hostname / rcon_password 默认值如下，start.sh 启动前会根据环境变量
// SERVER_HOSTNAME / RCON_PASSWORD（见 .env.example）用 sed 替换这两行。
// 命令行 +hostname 不支持带空格的值（引擎会按空格截断），故用 sed 改写 server.cfg 而非命令行参数。
hostname "1v1 Test Server"
rcon_password "test1234"
sv_lan "0"          // 0=互联网服务器（走 Steam 路由），1=局域网模式
sv_password ""      // 进服密码，留空表示不设密码

// RCON 防爆破：连续认证失败达到 sv_rcon_maxfailures 次后，封禁来源 IP sv_rcon_banpenalty 分钟
sv_rcon_banpenalty "60"
sv_rcon_maxfailures "5"
sv_rcon_minfailures "5"
sv_rcon_minfailuretime "30"

// ---------- 比赛核心规则 ----------
mp_freezetime "0"          // 回合开始后的冻结时间（秒），0=不冻结，可买枪后立即行动
mp_roundtime "1"           // 单回合时长（分钟）
mp_buytime "0.25"          // 买枪时间（分钟）
mp_startmoney "16000"      // 每局/每回合初始金钱
mp_maxmoney "16000"        // 金钱上限
mp_c4timer "35"            // C4 爆炸倒计时（秒）
mp_timelimit "0"           // 地图时间限制（分钟），0=不限制，由比赛流程插件控制换图
mp_friendlyfire "0"        // 1v1 对局无队友概念，友伤暂时关闭

// ---------- 队伍/出生相关（ReGameDLL，game.cfg 等价项，写在 server.cfg 一并管理） ----------
mp_autoteambalance "0"     // 1v1 房间固定 2 人，不需要队伍自动平衡
mp_limitteams "0"          // 同上，不限制队伍人数差
mp_freeforall "0"          // 关闭 FFA 模式，保持标准 T/CT 对抗
mp_round_restart_delay "1" // 回合结束到下一回合开始的延迟（秒）
mp_respawn_immunitytime "0"     // 重生保护时间（秒），0=关闭
mp_respawn_immunity_effects "1" // 重生保护期视觉效果（仅在保护时间>0时生效）
mp_autokick "0"            // 关闭引擎自动踢人（挂机踢人 + 连续TK踢人），任何角色都不会被自动踢出

// 友伤伤害衰减系数（mp_friendlyfire=0 时不生效，预留以便后续切换）
ff_damage_reduction_bullets "0.35"
ff_damage_reduction_grenade "0.25"
ff_damage_reduction_grenade_self "1.0"
ff_damage_reduction_other "0.35"

// ---------- 机器人 (CSBot / ZBot，ReGameDLL_CS 内置) ----------
// 人格档案/语音库见 cstrike/BotProfile.db、cstrike/BotChatter.db（已从 PROCS.PRO 复制）
bot_enable "1"          // 专用服务器需显式开启才能使用 bot_add 等指令
bot_quota "0"           // 默认不自动填充机器人，按需通过 rcon bot_add / bot_add_t / bot_add_ct 手动添加（用于单人练习/陪练）
bot_quota_mode "normal" // normal=按 bot_quota 数量填充
bot_difficulty "1"      // 默认难度 0~3（简单~专家），后续可由插件按对局需求调整
bot_chatter "off"       // 关闭机器人语音/文字喊话，避免干扰 1v1 对局
bot_join_delay "0"      // 换图后机器人加入延迟（秒）
bot_freeze "0"          // 机器人是否禁止移动，0=正常行动

// ---------- 网络 / Tick ----------
sys_ticrate "128"          // 服务器 tick rate

sv_maxrate "100000"
sv_minrate "100000"
sv_maxupdaterate "128"
sv_minupdaterate "128"

// 服务端延迟补偿（lag compensation）
sv_unlag "1"
sv_unlagsamples "1"
sv_unlagpush "0"
sv_maxunlag "0.5"

// ---------- ReHLDS 防护：放开命令/移动包频率限制 ----------
// 默认限制对正常对战玩家可能造成误伤（如快速换弹/连续指令），1v1 房间环境可控，故放宽
sv_rehlds_stringcmdrate_max_burst "99999"
sv_rehlds_stringcmdrate_max_avg "99999"
sv_rehlds_movecmdrate_max_burst "99999"
sv_rehlds_movecmdrate_max_avg "99999"
sv_rehlds_movecmdrate_avg_punish "-1"
sv_rehlds_movecmdrate_burst_punish "-1"
sv_rehlds_stringcmdrate_avg_punish "-1"
sv_rehlds_stringcmdrate_burst_punish "-1"

// ---------- 日志 ----------
log "on"
mp_logfile "0"      // 是否记录日志到文件，0=不记录（由插件/gateway 上报数据，避免重复落盘）
mp_logecho "0"      // 是否将日志回显到控制台
mp_logmessages "1"  // 记录玩家公屏聊天信息
sv_logbans "0"
sv_logblocks "0"
mp_logdetail "0"    // 0=不记录武器伤害详情

// ---------- 语音/聊天 ----------
sv_alltalk "1"      // 1v1 双方全程可互相听到语音，便于观赛/沟通
sv_voiceenable "1"
sv_voicequality "5"

// ---------- 资源下载 ----------
// 复用 PROCS.PRO 的 FastDL CDN，地图/资源走CDN下载，减轻游戏服务器自身带宽压力
sv_downloadurl "http://cstrike-cdn.smarteamlab.com/cstrike/"

// ---------- 其他 ----------
allow_spectators "1"
pausable "0"
sv_proxies "1"
sv_aim "0"
sv_timeout "65"
decalfrequency "60"
mp_consistency "1"
mp_forcecamera "0"
mp_forcechasecam "0"
sv_airaccelerate "10"
sv_cheats "0"
sv_gravity "800"
sv_maxspeed "320"
