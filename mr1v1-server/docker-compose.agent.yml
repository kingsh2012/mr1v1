version: "3"

# 每台rehlds主机部署一份：agent内置遥测网关(/record)+心跳+建房指令接收+
# docker.sock容器调度+RCON。连接中心栈的mosquitto，见 cmd/agent/agent.yml
# 的mqtt.broker（需改为中心栈对外可达地址）。

services:
  agent:
    build:
      context: .
      dockerfile: ./dockerfile/Dockerfile-agent
    container_name: mr1v1-agent
    restart: unless-stopped
    # host网络：rehlds容器(network_mode: host)通过 http://127.0.0.1:7778 访问agent；
    # agent也需要host网络才能用127.0.0.1 RCON连上同主机的rehlds容器。
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
