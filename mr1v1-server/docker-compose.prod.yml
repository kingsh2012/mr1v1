version: "3"

# 生产中心栈：consumer + backend，PG/EMQX 使用外部已有服务
# 部署在 192.144.237.182，镜像在境外机器构建后 docker save 传入

services:
  consumer:
    image: mr1v1-consumer:latest
    container_name: mr1v1-consumer
    restart: unless-stopped
    network_mode: host

  manager-backend:
    image: mr1v1-manager-backend:latest
    container_name: mr1v1-manager-backend
    restart: unless-stopped
    network_mode: host
