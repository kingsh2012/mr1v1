services:
  mr1v1-consumer:
    image: registry.cn-beijing.aliyuncs.com/kingsh2012/mr1v1-consumer:0.1.9
    container_name: mr1v1-consumer
    restart: unless-stopped
    network_mode: host
    environment:
      - MQTT_BROKER=tcp://10.2.8.8:1883
      - MQTT_TOPIC=mr1v1/#
      - MQTT_USER=saas
      - MQTT_PASS=saas
      - DB_HOST=10.2.8.8
      - DB_PORT=5433
      - DB_USER=mr1v1
      - DB_PASS=Mr1v1Db2026!
      - DB_NAME=mr1v1
      - DB_SSL_MODE=disable
      - DB_TIMEZONE=Asia/Shanghai
      - WX_BACKEND_URL=http://127.0.0.1:8082
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}

  mr1v1-miniprogram-backend:
    image: registry.cn-beijing.aliyuncs.com/kingsh2012/mr1v1-miniprogram-backend:0.1.14
    container_name: mr1v1-miniprogram-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/mr1v1-avatars:/data/avatars
    environment:
      - WX_APP_ID=wx04b9f2b8ddbd9fcf
      - WX_APP_SECRET=${WX_APP_SECRET}
      - BACKEND_URL=http://127.0.0.1:8181
      - WX_PORT=8082
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - AVATARS_DIR=/data/avatars
      - WX_PUBLIC_URL=https://mr1v1.smarteamlab.com

  mr1v1-manager-backend:
    image: registry.cn-beijing.aliyuncs.com/kingsh2012/mr1v1-manager-backend:0.1.20
    container_name: mr1v1-manager-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - HTTP_LISTEN=0.0.0.0:8181
      - MQTT_BROKER=tcp://10.2.8.8:1883
      - MQTT_USER=saas
      - MQTT_PASS=saas
      - DB_HOST=10.2.8.8
      - DB_PORT=5433
      - DB_USER=mr1v1
      - DB_PASS=Mr1v1Db2026!
      - DB_NAME=mr1v1
      - DB_SSL_MODE=disable
      - DB_TIMEZONE=Asia/Shanghai
      - AGENT_STALE_SECONDS=30
      - MATCH_WAITING_TIMEOUT_SECONDS=300
      - MATCH_PLAYING_TIMEOUT_SECONDS=900
      - ADMIN_PASS=${ADMIN_PASS}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - LEGACY_API_URL=${LEGACY_API_URL}
      - WX_BACKEND_URL=http://127.0.0.1:8082
